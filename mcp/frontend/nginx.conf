server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Reply data from main backend — proxy to main app for real reply tracking
    location /api/replies/ {
        proxy_pass http://172.17.0.1:8000/api/replies/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Company-ID 1;
    }

    # Projects API from main backend (for project names used by Tasks page)
    location /api/contacts/projects/ {
        proxy_pass http://172.17.0.1:8000/api/contacts/projects/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Company-ID 1;
    }

    # ALL other API calls go to MCP backend — isolated
    location /api/ {
        proxy_pass http://mcp-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # MCP SSE
    location /mcp/ {
        proxy_pass http://mcp-backend:8000/mcp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
