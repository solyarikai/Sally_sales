server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ALL API calls go to MCP backend only — completely isolated
    location /api/ {
        proxy_pass http://mcp-backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # MCP SSE
    location /mcp/ {
        proxy_pass http://mcp-backend:8000/mcp/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
