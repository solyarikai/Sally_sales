<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — LeadGen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .card { background: #1a1d27; border: 1px solid #2d3141; border-radius: 12px; padding: 32px; width: 340px; }
  .logo { text-align: center; margin-bottom: 24px; font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: #f59e0b; }
  label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
  input { width: 100%; padding: 10px 12px; background: #0f1117; border: 1px solid #2d3141; border-radius: 8px; color: #e2e8f0; font-size: 14px; outline: none; margin-bottom: 16px; }
  input:focus { border-color: #f59e0b; }
  button { width: 100%; padding: 10px; background: #f59e0b; color: #0f1117; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  button:hover { background: #d97706; }
  .error { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 12px; display: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><span>S</span> LeadGen</div>
  <div class="error" id="err">Invalid credentials</div>
  <form id="form">
    <label>Username</label>
    <input type="text" id="user" autocomplete="username" autofocus>
    <label>Password</label>
    <input type="password" id="pass" autocomplete="current-password">
    <button type="submit">Sign in</button>
  </form>
</div>
<script>
document.getElementById('form').addEventListener('submit', function(e) {
  e.preventDefault();
  var u = document.getElementById('user').value.trim();
  var p = document.getElementById('pass').value;
  if (u === 'ilovesally' && p === 'BdaP31NNXX4ZCyvU') {
    document.cookie = 'session=b50dfaf122f28a67cb0655ada0040fed8bb06f42fc999d46; path=/; max-age=604800; SameSite=Lax';
    window.location.href = '/';
  } else {
    document.getElementById('err').style.display = 'block';
  }
});
</script>
</body>
</html>
