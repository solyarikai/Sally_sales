server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Login page — no auth
    location = /login.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Webhook endpoints — no auth (external services call these)
    location = /api/getsales/webhook {
        proxy_pass http://leadgen-backend:8000/api/getsales/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    location = /api/webhooks/smartlead {
        proxy_pass http://leadgen-backend:8000/api/webhooks/smartlead;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Handle client-side routing
    location / {
        if ($cookie_session != "b50dfaf122f28a67cb0655ada0040fed8bb06f42fc999d46") {
            return 302 /login.html;
        }
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Allow file uploads up to 10MB
    client_max_body_size 10m;

    # MoltBot Monitor proxy
    location /monitor/ {
        proxy_pass http://moltbot-monitor:18795/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy API requests to backend
    location /api/ {
        if ($cookie_session != "b50dfaf122f28a67cb0655ada0040fed8bb06f42fc999d46") {
            return 401;
        }
        proxy_pass http://leadgen-backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for slow operations (Google Sheets API)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 120s;
    }

    # WebSocket support
    location /ws/ {
        if ($cookie_session != "b50dfaf122f28a67cb0655ada0040fed8bb06f42fc999d46") {
            return 401;
        }
        proxy_pass http://leadgen-backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
