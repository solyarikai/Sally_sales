version: "3.9"

services:
  gathering-dach:
    build: .
    container_name: gathering-dach
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - gathering-dach-data:/data
      - /root/magnum-opus-project/repo/google-credentials.json:/app/google-credentials.json:ro
      # Puppeteer script + node_modules from main repo (no need to npm install in container)
      - /root/magnum-opus-project/repo/scripts:/app/scripts:ro
      - /root/magnum-opus-project/repo/node_modules:/app/node_modules:ro
      # Shared output dir for scraped company JSON files
      - /root/magnum-opus-project/repo/gathering-data:/app/gathering-data
    environment:
      - APOLLO_API_KEY=${APOLLO_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google-credentials.json
      - PROJECT_ID=9
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  gathering-dach-data:
