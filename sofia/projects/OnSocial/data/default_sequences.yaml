# Default sequences для deep-personalization (tier=default fallback)
# Структура: SEGMENT_ROLE → 3-step sequence
# Источник: production sequences из v5_proposed_2026-04-27.md и launch_batch_2026-04-28
#
# 13 комбинаций для 30 кампаний:
#   INFPLAT × {FOUNDERS, TECHLEAD, ACCOUNT_OPS, HEAD}
#   IMAGENCY × {FOUNDERS, TECHLEAD, ACCOUNT_OPS, HEAD, CREATIVE}
#   AFFPERF × {FOUNDERS, TECHLEAD, ACCOUNT_OPS, HEAD}
#
# Маппинг кампания → segment_role:
#   из имени `c-OnSocial_<SEGMENT>_<ROLE>_<...>` извлечь SEGMENT и ROLE
#   ROLE_FALLBACK: если роль не из набора → использовать FOUNDERS (универсальный)
#
# ============================================================
# ПЕРЕМЕННЫЕ
# ============================================================
# {{first_name}}            — имя лида (всегда заполнено)
# {{company_name}}          — название компании (всегда)
# {{cf_competitor_client}}  — cf_competitor_client (per-lead custom field в SmartLead)
#                              Источник: lead.custom_fields.cf_competitor_client
#                              Пример: "Whalar, Kolsquare, Billion Dollar Boy"
#
# ⚠️ ВАЖНО — обработка пустого cf_competitor_client:
# Перед загрузкой sequence в SmartLead проверить что у всех лидов кампании
# есть непустой cf_competitor_client. Если у части лидов поле пустое:
#   1. Заполнить generic значением для соответствующего сегмента:
#      INFPLAT  → "Modash, Captiv8, Kolsquare, Phyllo and Lefty"
#      IMAGENCY → "Whalar, Billion Dollar Boy and Ykone"
#      AFFPERF  → "Captiv8, Phyllo and impact.com"
#   2. Записать через mcp__smartlead__update_lead с custom_fields={"cf_competitor_client": "<generic>"}
#
# Это нужно потому что SmartLead не подставляет fallback для пустых custom fields —
# в инбоксе появится литеральный "{{cf_competitor_client}}".

