  "/api/projects/{project_id}/project_runs":
    post:
      summary: Creates a ProjectRun
      description: |2
                Creates a new ProjectRun for the specified project. You can use different set of parameters for different cases:
                - no parameters: runs all enrichers/filters of the project to get the final result
                - run_dataset_id: runs all enrichers/filters of the project on the specified dataset
                - enricher_id: runs the specified enricher/filter on the project in case of first enricher. The run will use the source as a dataset
                - run_dataset_id and enricher_id: runs the specified enricher/filter on the specified dataset
      tags:
      - ProjectRuns
      security:
      - bearerAuth: []
      parameters:
      - name: project_id
        in: path
        required: true
        schema:
          type: integer
      responses:
        '201':
          description: project_run created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProjectRun"
        '402':
          description: insufficient credits balance
        '404':
          description: not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                run_dataset_id:
                  type: integer
                  nullable: true
                enricher_id:
                  type: integer
                  nullable: true
                required_amount:
                  type: integer
                  nullable: true
