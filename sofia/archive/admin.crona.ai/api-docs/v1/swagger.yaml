---
openapi: 3.0.1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SourceTypeEnum:
      type: string
      enum:
      - sales_navigator
      - websites_list
      description: Type of the source for the project, can be either sales_navigator
        or websites_list
    EnricherTypeEnum:
      type: string
      enum:
      - filter
      - enricher
      - person_linkedin_details
      - company_linkedin_details
      - code
      - call_ai
      - scrape_website
      - person_verified_email
      - google_search
      - scrape_linkedin_posts
      - filter_code
      - filter_call_ai
      - find_person_linkedin
      - linkedin_activity_score
      - one_input_find_person_linkedin
      description: Type of the enricher
    ProjectRunStatusEnum:
      type: string
      enum:
      - pending
      - running
      - completed
      - failed
      - cancelled
      description: Status of the project run, can be pending, running, completed,
        cancelled, or failed
    AvailableColumnTypeEnum:
      type: string
      enum:
      - group
      - column
      description: Type of the available column, can be either group or column
    ProjectExamplesTypeEnum:
      type: string
      enum:
      - sales_nav_people
      - sales_nav_companies
      description: Type of the project examples, can be either sales_nav_people or
        sales_nav_companies
    Client:
      type: object
      required:
      - id
      - email
      - name
      - active
      - credits_balance
      - stripe_customer_id
      - created_at
      - updated_at
      properties:
        id:
          type: integer
          example: 884
        email:
          type: string
          format: email
          example: test@example.com
        name:
          type: string
          example: name
        active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: '2025-09-04T09:21:33.251Z'
        updated_at:
          type: string
          format: date-time
          example: '2025-09-04T09:21:33.279Z'
        credits_balance:
          type: integer
          example: 100
        stripe_customer_id:
          type: string
          nullable: true
          example: cus_123
    ClientLogin:
      allOf:
      - "$ref": "#/components/schemas/Client"
      - type: object
        required:
        - jwt_token
        properties:
          jwt_token:
            type: string
            example: eyJ...
    Project:
      type: object
      properties:
        id:
          type: integer
          nullable: false
        name:
          type: string
          nullable: false
        source_type:
          "$ref": "#/components/schemas/SourceTypeEnum"
          nullable: true
        source_urls:
          type: array
          items:
            type: string
          nullable: true
          description: URLs of the source applicable for sales_navigator source_type
        source_file_name:
          type: string
          nullable: true
          description: File name with extension applicable for websites_list source
            type
        source_dataset_id:
          type: integer
          nullable: true
          description: ID of the source dataset
        status:
          type: string
          nullable: false
          "$ref": "#/components/schemas/ProjectRunStatusEnum"
          description: Current status of the project. Status of the project's last
            run
        error_message:
          type: string
          nullable: true
          description: Error message from the current project run if any
        current_project_run_id:
          type: integer
          nullable: true
          description: ID of the current project run if any
        sales_nav_cookies:
          type: string
          nullable: true
          description: Sales Navigator cookies, only applicable if source_type is
            sales_navigator
        sales_nav_user_agent:
          type: string
          nullable: true
          description: Sales Navigator user agent, only applicable if source_type
            is sales_navigator
        sales_nav_proxy_url:
          type: string
          nullable: true
          description: Sales Navigator proxy URL, only applicable if source_type is
            sales_navigator
        source_file_url:
          type: string
          nullable: true
          description: URL to download the source file, only applicable if source_type
            is websites_list
        rows_count:
          type: integer
          nullable: true
          description: Number of rows in the source
        with_preprocessing:
          type: boolean
          nullable: false
          description: Indicates whether preprocessing is enabled for the project.
            Use only for sales_nav projects
        max_pages:
          type: integer
          nullable: true
          description: Maximum number of pages to scrape for sales_nav projects. Use
            only for sales_nav projects
      required:
      - id
      - name
      - status
    Enricher:
      type: object
      properties:
        id:
          type: integer
          nullable: false
        name:
          type: string
          nullable: false
        field_name:
          type: string
          nullable: false
          description: Field name for the enricher, must be letters, numbers, and
            underscores
        code:
          type: string
          nullable: false
          description: Code for the enricher, can be any valid Ruby code
        order:
          type: integer
          nullable: false
          description: Order of the enricher in the list
        type:
          nullable: false
          "$ref": "#/components/schemas/EnricherTypeEnum"
        warnings:
          type: array
          nullable: true
          description: Code syntax error if any
          items:
            type: string
        arguments:
          type: object
          nullable: true
          description: Arguments for the enricher as a JSON object
        credits_amount:
          type: integer
          nullable: false
          description: Amount of credits required to run this enricher
      required:
      - id
      - name
      - field_name
      - code
      - order
      - type
      - credits_amount
    ProjectRun:
      type: object
      properties:
        id:
          type: integer
          nullable: false
        created_at:
          type: string
          format: date_time
          nullable: false
          description: Formatted creation timestamp (YYYY-MM-DD HH:MM:SS)
        status:
          "$ref": "#/components/schemas/ProjectRunStatusEnum"
          nullable: false
      required:
      - id
      - created_at
      - status
    EnricherRun:
      type: object
      properties:
        id:
          type: integer
          nullable: false
        code:
          type: string
          nullable: false
        arguments:
          type: object
          nullable: false
          description: Arguments for the enricher run as a JSON object
        run_at:
          type: string
          format: date_time
          nullable: false
          description: Run timestamp formatted as YYYY-MM-DD HH:MM:SS
        run_dataset_id:
          type: integer
          nullable: true
          description: ID of the result dataset
        run_dataset_rows_count:
          type: integer
          nullable: true
          description: Number of rows in the result dataset
      required:
      - id
      - code
      - run_at
      - run_dataset_id
      - run_dataset_rows_count
      - arguments
    Error:
      type: object
      properties:
        error:
          type: string
          example: Server error
    ValidationErrors:
      type: object
      properties:
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
      example:
        errors:
          field1:
          - wrong
          field2:
          - wrong
    EnricherTypeArgumentType:
      type: string
      enum:
      - column
      - enum
      - ai_prompt
      - code
      - templated_text
      description: Type of the argument, can be either column, enum, ai_prompt, or
        code
    EnricherTypeArgument:
      type: object
      properties:
        name:
          type: string
          description: Argument name
          nullable: false
        type:
          "$ref": "#/components/schemas/EnricherTypeArgumentType"
          nullable: false
        required:
          type: boolean
          description: Is argument required?
          nullable: false
        display_name:
          type: string
          description: Argument display name
          nullable: true
        enum_options:
          type: array
          items:
            type: string
          description: Array of possible values for enum type
          nullable: true
        default_value:
          type: string
          description: Default value
          nullable: true
      required:
      - name
      - type
      - required
    EnricherType:
      type: object
      properties:
        name:
          "$ref": "#/components/schemas/EnricherTypeEnum"
          description: Unique name of the enricher type
          nullable: false
        display_name:
          type: string
          nullable: true
          description: Display name of the enricher type
        description:
          type: string
          nullable: true
          description: Description of the enricher type
        arguments:
          type: array
          items:
            "$ref": "#/components/schemas/EnricherTypeArgument"
          nullable: false
        data_sample:
          anyOf:
          - type: object
          - type: string
          - type: array
            items:
              type: object
          description: Sample data, can be an object or a string
          nullable: true
        icon:
          type: string
          nullable: true
          description: URL to the icon representing the enricher type
        credits_amount:
          type: integer
          nullable: true
          description: Number of credits that will be spent
        help:
          type: string
          nullable: true
          description: Help text or URL for the enricher type
      required:
      - name
      - arguments
      - icon
      - credits_amount
    AvailableColumn:
      type: object
      properties:
        name:
          type: string
          description: Column name
          nullable: false
        inner_elements:
          type: array
          items:
            "$ref": "#/components/schemas/AvailableColumn"
          description: Array of inner elements
          nullable: true
        type:
          "$ref": "#/components/schemas/AvailableColumnTypeEnum"
          nullable: false
      required:
      - name
      - type
info:
  title: API V1
  version: v1
paths:
  "/api/clients/sign_in":
    post:
      summary: Sign in (get JWT in Authorization)
      tags:
      - Authenticate client
      security: []
      parameters: []
      responses:
        '201':
          description: OK
          headers:
            Authorization:
              schema:
                type: string
              description: Bearer <JWT>
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ClientLogin"
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - client
              properties:
                client:
                  type: object
                  required:
                  - email
                  - password
                  properties:
                    email:
                      type: string
                      format: email
                      example: client@domain.com
                    password:
                      type: string
                      example: Qwerty123!
  "/api/clients/sign_out":
    delete:
      summary: Sign out (revoke current token)
      tags:
      - Authenticate client
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No Content
  "/api/clients/sign_out_all":
    delete:
      summary: Sign out everywhere (revoke all tockens)
      tags:
      - Authenticate client
      security:
      - bearerAuth: []
      responses:
        '204':
          description: All sessions revoked
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/clients":
    post:
      summary: Sign up (create client)
      tags:
      - Authenticate client
      security: []
      parameters: []
      responses:
        '201':
          description: Created (confirmation email sent)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Client"
        '422':
          description: Validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationErrors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - client
              properties:
                client:
                  type: object
                  required:
                  - email
                  - password
                  - password_confirmation
                  properties:
                    email:
                      type: string
                      format: email
                      example: client@domain.com
                    name:
                      type: string
                      example: name
                    password:
                      type: string
                      minLength: 6
                      example: Qwerty123!
                    password_confirmation:
                      type: string
                      example: Qwerty123!
    put:
      summary: Update account (email/password)
      tags:
      - Authenticate client
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationErrors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - client
              properties:
                client:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                      example: new@domain.com
                    name:
                      type: string
                      example: new name
                    password:
                      type: string
                      minLength: 6
                      example: Qwerty123?
                    password_confirmation:
                      type: string
                      example: Qwerty123?
                    current_password:
                      type: string
                      example: Qwerty123!
    delete:
      summary: Deactivate account
      tags:
      - Authenticate client
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/clients/confirmation":
    get:
      summary: Confirm account by token
      tags:
      - Authenticate client
      security: []
      parameters:
      - name: confirmation_token
        in: query
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Confirmed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Client"
        '422':
          description: Invalid token
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationErrors"
    post:
      summary: Resend confirmation
      tags:
      - Authenticate client
      security: []
      parameters: []
      responses:
        '201':
          description: Sent
        '422':
          description: Validation Errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationErrors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - client
              properties:
                client:
                  type: object
                  required:
                  - email
                  properties:
                    email:
                      type: string
                      format: email
                      example: client@domain.com
  "/api/clients/password":
    post:
      summary: Request password reset email
      tags:
      - Authenticate client
      security: []
      parameters: []
      responses:
        '201':
          description: Email sent
        '422':
          description: Validation Errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationErrors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - client
              properties:
                client:
                  type: object
                  required:
                  - email
                  properties:
                    email:
                      type: string
                      format: email
                      example: client@domain.com
    put:
      summary: Set new password by reset token
      tags:
      - Authenticate client
      security: []
      parameters: []
      responses:
        '204':
          description: Password updated
        '422':
          description: Invalid token or validation errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationErrors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - client
              properties:
                client:
                  type: object
                  required:
                  - reset_password_token
                  - password
                  - password_confirmation
                  properties:
                    reset_password_token:
                      type: string
                      example: token
                    password:
                      type: string
                      minLength: 6
                      example: Qwerty123?
                    password_confirmation:
                      type: string
                      example: Qwerty123?
  "/api/clients/unlock":
    get:
      summary: Unlock by token
      tags:
      - Authenticate client
      security: []
      parameters:
      - name: unlock_token
        in: query
        schema:
          type: string
        required: true
      responses:
        '200':
          description: Unlocked
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Client"
        '422':
          description: Invalid token
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationErrors"
    post:
      summary: Resend unlock instructions
      tags:
      - Authenticate client
      security: []
      parameters: []
      responses:
        '201':
          description: Sent
        '422':
          description: Validation Errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ValidationErrors"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - client
              properties:
                client:
                  type: object
                  required:
                  - email
                  properties:
                    email:
                      type: string
                      format: email
                      example: client@domain.com
  "/api/billing/credit_events":
    get:
      summary: Retrieves client's credit events
      tags:
      - Billing
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List credit events
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                  - id
                  - created_at
                  - delta
                  - meta
                  - reason
                  - usd_paid
                  - invoice_url
                  properties:
                    id:
                      type: integer
                      example: 9
                    created_at:
                      type: string
                      format: date-time
                      example: '2025-09-11T17:58:32.779Z'
                    delta:
                      type: integer
                      example: 1000
                    usd_paid:
                      type: integer
                      example: 1000
                    invoice_url:
                      type: string
                      example: https://invoice.pdf
                    meta:
                      type: object
                      additionalProperties: true
                    reason:
                      type: string
                      example: monthly_grant
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/billing/plans":
    get:
      summary: Retrieves actual subscription plans
      tags:
      - Billing
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List all plans
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                  - id
                  - unit_amount
                  - nickname
                  - tier
                  - interval
                  - credits
                  - price_per_credit
                  properties:
                    id:
                      type: string
                      example: crona_m_150000
                    unit_amount:
                      type: integer
                      example: 200000
                    nickname:
                      type: string
                      example: Pro 150000 monthly
                    tier:
                      type: string
                      example: Pro
                    interval:
                      type: string
                      enum:
                      - month
                      example: month
                    credits:
                      type: integer
                      example: 150000
                    price_per_credit:
                      type: number
                      format: float
                      example: 0.0133
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/billing/portal":
    post:
      summary: Creates client's portal session
      tags:
      - Billing
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Portal URL
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - url
                properties:
                  url:
                    type: string
                    example: https://fresh_portal_url
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Stripe customer missing
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/billing/spent_credits":
    get:
      summary: Retrieves client's spent credits per month (last 6 months)
      tags:
      - Billing
      security:
      - bearerAuth: []
      responses:
        '200':
          description: List spent credits by month
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: false
                  required:
                  - month
                  - spent
                  properties:
                    month:
                      type: string
                      example: March 2025
                      description: Month and year (e.g. "March 2025")
                    spent:
                      type: integer
                      example: 42
                      description: Credits spent in that month
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/billing/subscription":
    get:
      summary: Show Current Subscription
      tags:
      - Billing
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Returns Current Subscription
          content:
            application/json:
              schema:
                type: object
                required:
                - id
                - created_at
                - updated_at
                - interval
                - lookup_key
                - next_grant_at
                - plan_limit
                - plan_type
                - started_at
                - status
                - stripe_price_id
                - stripe_subscription_id
                - tier
                properties:
                  id:
                    type: integer
                    example: 2
                  created_at:
                    type: string
                    format: date-time
                    example: '2025-09-25T12:33:15Z'
                  updated_at:
                    type: string
                    format: date-time
                    example: '2025-09-25T12:33:15Z'
                  interval:
                    type: string
                    enum:
                    - month
                    example: month
                  lookup_key:
                    type: string
                    example: crona_m_1000
                  next_grant_at:
                    type: string
                    format: date-time
                    example: '2025-10-25T12:33:15Z'
                  plan_limit:
                    type: integer
                    example: 1000
                  plan_type:
                    type: string
                    example: paid
                  started_at:
                    type: string
                    format: date-time
                    example: '2025-09-25T12:33:15Z'
                  status:
                    type: string
                    example: active
                  stripe_price_id:
                    type: string
                    nullable: true
                    example: price_123
                  stripe_subscription_id:
                    type: string
                    nullable: true
                    example: sub_123
                  tier:
                    type: string
                    nullable: true
                    example: Explorer
        '401':
          description: Not Authorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
    post:
      summary: Create Subscription Checkout Session
      tags:
      - Billing
      security:
      - bearerAuth: []
      parameters: []
      responses:
        '200':
          description: Checkout Session URL
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - url
                - schedule_id
                properties:
                  url:
                    type: string
                    nullable: true
                    example: https://checkout_url
                  schedule_id:
                    type: string
                    nullable: true
                    example: sched_123
        '401':
          description: Not Authorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Unknown lookup_key
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - lookup_key
              properties:
                lookup_key:
                  type: string
                  example: crona_m_10000
  "/api/billing/subscription/cancel":
    post:
      summary: Cancel at end of period
      tags:
      - Billing
      security:
      - bearerAuth: []
      responses:
        '204':
          description: Cancel is scheduled
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
          description: Generic error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
  "/api/billing/subscription/renew":
    post:
      summary: Revoke scheduled cancel
      tags:
      - Billing
      security:
      - bearerAuth: []
      responses:
        '204':
          description: Subscription renewed
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
        '422':
